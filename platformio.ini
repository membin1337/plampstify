; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Shared by every [env:*] below. Library sources are pinned to exact
; owner/repo (rather than bare names like "AsyncTCP") because PlatformIO's
; library manager resolved the bare name ambiguously when a second
; environment was added - it pulled in a Raspberry Pi Pico W variant of
; AsyncTCP instead of the ESP32 one, breaking the build. Pinning avoids that.
[env]
platform = espressif32
board = esp-wrover-kit
framework = arduino
lib_deps =
	https://github.com/mathieucarbou/ESPAsyncWebServer.git
	https://github.com/ESP32Async/AsyncTCP.git
	ArduinoJson
	DHT sensor library

; USB upload (default). Use this for the very first upload after adding OTA
; support - the device needs OTA-capable code running before it can accept
; wireless uploads.
[env:esp-wrover-kit]

; Wireless upload - use this env for every upload after the first one above.
; Run with:
;   pio run -e esp-wrover-kit-ota -t upload
[env:esp-wrover-kit-ota]
upload_protocol = espota
upload_port = 192.168.0.69   ; <-- set to the ESP32's actual IP (matches the app's API_IP setting)
upload_flags =
	--auth=plamp-ota          ; <-- must match otaPassword in main.cpp
